name: fvb_bias
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # Python
  - python=3.11
  - numpy=2.4.6
  - scipy=1.17.1
  - pandas=3.0.3
  - matplotlib=3.11.0
  - pysam=0.22
  # Alignment and quantification
  - star=2.7.10a
  - fastp=1.3.3
  - samtools=1.17
  - subread=2.0.3        # provides featureCounts
  # Variant tools
  - gatk4=4.6.2.0
  # R and edgeR (for differential expression)
  - r-base=4.2.2
  - bioconductor-edger=3.40.2
  # Utilities
  - pip
  - pip:
    - g2gtools==0.2.7    # requires Python 3 iterator patch; see pipeline/01_build_references.sh
